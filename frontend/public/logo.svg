<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer star shape with 8 points -->
  <g fill="#0EA5E9">
    <!-- Top point -->
    <polygon points="32,4 38,14 26,14"/>
    <!-- Top-right point -->
    <polygon points="50,12 56,20 46,24"/>
    <!-- Right point -->
    <polygon points="60,32 50,38 50,26"/>
    <!-- Bottom-right point -->
    <polygon points="52,52 44,40 56,44"/>
    <!-- Bottom point -->
    <polygon points="32,60 38,50 26,50"/>
    <!-- Bottom-left point -->
    <polygon points="12,52 8,40 24,44"/>
    <!-- Left point -->
    <polygon points="4,32 14,26 14,38"/>
    <!-- Top-left point -->
    <polygon points="12,12 20,20 8,24"/>
  </g>
  
  <!-- Inner circle with border -->
  <circle cx="32" cy="32" r="24" fill="white" stroke="#0EA5E9" strokeWidth="2.5"/>
  
  <!-- RLC Text in bold red -->
  <text x="32" y="40" fontFamily="Arial, Helvetica, sans-serif" fontSize="28" fontWeight="900" fill="#FB0202" textAnchor="middle" dominantBaseline="middle" letterSpacing="-1">RLC</text>
</svg>
